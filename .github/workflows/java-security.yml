name: Java Security (reusable)

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "17"

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

  dependency-check:
    name: OWASP dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
      - run: ./mvnw -B -DskipTests verify -P security
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 14

  # CodeQL removed - GitHub Advanced Security is required for code scanning on
  # private repositories and is a paid add-on. SpotBugs + FindSecBugs (in the
  # quality profile) provides equivalent static security analysis for free.
