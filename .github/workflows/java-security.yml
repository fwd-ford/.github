name: Java Security (reusable)

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "17"

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: ./.trivyignore
          format: table

  # OWASP dependency-check removed: was non-blocking and overlapped with
  # Trivy filesystem scan + Dependabot, which cover CVE surface in deps.
  # CodeQL not wired: GitHub Advanced Security is paid on private orgs.
  # SpotBugs + FindSecBugs (java-quality) provide free static analysis.
