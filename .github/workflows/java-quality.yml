name: Java Quality (reusable)

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "17"
      maven-args:
        type: string
        default: ""

jobs:
  format:
    name: Spotless format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
      - run: ./mvnw -B spotless:check ${{ inputs.maven-args }}

  lint:
    name: Checkstyle and SpotBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
      - run: ./mvnw -B -DskipTests verify -P quality ${{ inputs.maven-args }}

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
      - run: ./mvnw -B test ${{ inputs.maven-args }}
      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
