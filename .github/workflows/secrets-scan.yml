name: Secrets Scan (reusable)

on:
  workflow_call:
    inputs:
      scan-history:
        type: boolean
        default: false
        description: "Scan full git history (slow). Default scans only changed files in PR / latest commit on push."

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.scan-history && 0 || 1 }}

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks
        run: |
          CONFIG_ARG=""
          if [ -f .gitleaks.toml ]; then
            CONFIG_ARG="--config=.gitleaks.toml"
          fi
          if [ "${{ inputs.scan-history }}" = "true" ]; then
            gitleaks detect $CONFIG_ARG --no-banner --redact --verbose
          else
            gitleaks detect $CONFIG_ARG --no-banner --redact --verbose --no-git
          fi
