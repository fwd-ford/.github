name: Secrets Scan (reusable)

on:
  workflow_call:
    inputs:
      scan-history:
        type: boolean
        default: false
        description: "Scan full git history (slow). Default scans only changed files in PR / latest commit on push."

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.scan-history && 0 || 1 }}
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
